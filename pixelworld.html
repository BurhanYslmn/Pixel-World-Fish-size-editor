<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel World Fish Caught LBS Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Press+Start+2P&family=Ubuntu+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #editor-canvas { image-rendering: -moz-crisp-edges; image-rendering: -webkit-optimize-contrast; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

<main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

  <section class="lg:col-span-5">
    <div class="bg-slate-950 p-5 rounded-2xl">
      <h2 class="text-xs font-bold text-slate-400 mb-3">Image</h2>
      <div class="relative border-dashed border p-3 rounded-xl">
        <input id="image-uploader" type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
        <div class="text-center text-xs text-slate-300">Upload your screenshot or drop here</div>
        <div id="upload-status" class="mt-2 text-[11px] text-slate-400"></div>
      </div>
      <div class="mt-4 bg-slate-900 p-4 rounded">
        <label class="text-[11px] mb-1 block">New Weight (LBS)</label>
        <div class="flex gap-2">
          <input id="input-main-weight" class="flex-1 bg-slate-950 px-3 py-2 rounded" value="98.75">
          <span class="px-3 py-2 bg-slate-800 rounded">lbs</span>
        </div>
      </div>
    </div>
  </section>

  <section class="lg:col-span-7">
    <div class="bg-slate-950 p-4 rounded-2xl">
      <div class="flex justify-between items-center mb-3">
        <div class="text-xs font-bold">Preview</div>
        <label class="text-xs"><input id="toggle-guides" type="checkbox" checked> Show Edit Guides</label>
      </div>
      <div id="canvas-stage" class="bg-slate-900 p-3 rounded min-h-[320px] flex items-center justify-center relative">
        <div id="canvas-loader" class="absolute inset-0 bg-slate-950/80 flex items-center justify-center hidden">Loading...</div>
        <canvas id="editor-canvas" class="border rounded"></canvas>
      </div>
    </div>
  </section>

</main>

<div id="toast" style="position:fixed;right:16px;bottom:16px;display:none;background:#111;padding:8px;border-radius:8px;color:#fff;font-size:13px"></div>

<script>
// Minimal, cleaned script with fixes for: phantom image load, merge markers, focus outline
const canvas = document.getElementById('editor-canvas');
const ctx = canvas.getContext('2d');
const imageUploader = document.getElementById('image-uploader');
const uploadStatusEl = document.getElementById('upload-status');
const canvasLoader = document.getElementById('canvas-loader');
const inputMainWeight = document.getElementById('input-main-weight');
const toggleGuides = document.getElementById('toggle-guides');
const toast = document.getElementById('toast');

let state = { baseImage: new Image(), loaded: false, defaultSrc: '167128b0-ebd9-49ab-9c1a-c61703e06b80.jpg' };
let mainX = 503, mainY = 315, mainW = 94, mainH = 24, mainFont = 13;
let mainFocused = false;

function showToast(msg, ok=true){ toast.textContent=msg; toast.style.display='block'; toast.style.background = ok ? '#064e3b' : '#7c2d12'; setTimeout(()=>toast.style.display='none',2500); }
function setUploadStatus(s, err=false){ if(uploadStatusEl){ uploadStatusEl.textContent = s; uploadStatusEl.style.color = err ? '#fca5a5' : '#93c5fd'; }}

function draw(){
  if(!state.loaded) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(state.baseImage && state.baseImage.complete && state.baseImage.naturalWidth>0){ ctx.drawImage(state.baseImage,0,0); }
  // draw mask
  ctx.fillStyle = '#0c1b2d';
  ctx.fillRect(mainX-mainW/2, mainY-mainH/2, mainW, mainH);
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff'; ctx.font = `bold ${mainFont}px Arial`;
  ctx.fillText(inputMainWeight.value + ' lbs', mainX, mainY);
  if(mainFocused && toggleGuides.checked){ ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1.5; ctx.setLineDash([4,2]); ctx.strokeRect(mainX-mainW/2, mainY-mainH/2, mainW, mainH); ctx.setLineDash([]); }
}

function switchToVector(){ canvas.width=1024; canvas.height=576; state.loaded = true; mainX=512; mainY=325; mainW=140; mainH=30; mainFont=18; draw(); }

imageUploader.addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(!f){ setUploadStatus('No file selected', true); return; }
  setUploadStatus('Processing ' + f.name);
  const isImage = f.type && f.type.startsWith('image/');
  const ext = f.name && f.name.match(/\.(png|jpe?g|webp|gif|bmp)$/i);
  if(!isImage && !ext){ setUploadStatus('Not an image', true); showToast('Lütfen görsel seçin', false); return; }
  const url = URL.createObjectURL(f);
  loadScreenshot(url, () => { URL.revokeObjectURL(url); setUploadStatus('Loaded'); showToast('Image loaded'); });
  e.target.value='';
});

function loadScreenshot(src, cb){
  canvasLoader.classList.remove('hidden');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = ()=>{ state.baseImage = img; canvas.width = img.naturalWidth; canvas.height = img.naturalHeight; state.loaded = true; canvasLoader.classList.add('hidden'); draw(); if(cb)cb(); };
  img.onerror = (ev)=>{
    canvasLoader.classList.add('hidden');
    // if src is bare filename and running file://, avoid noisy errors
    const isBare = typeof src === 'string' && !/^data:|^blob:|^https?:\/\//i.test(src);
    if(location && location.protocol === 'file:' && isBare){ console.debug('Suppress missing local default image:', src); setUploadStatus('Using vector template'); switchToVector(); return; }
    console.error('Image failed to load', ev, src); setUploadStatus('Image failed to load', true); showToast('Image failed to load', false); switchToVector();
  };
  img.src = src;
}

// Click handling: focus mask when clicking inside it or when input focused; clear on outside click
canvas.addEventListener('mousedown', e=>{
  if(!state.loaded) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width/rect.width);
  const y = (e.clientY - rect.top) * (canvas.height/rect.height);
  const within = x >= mainX-mainW/2 && x <= mainX+mainW/2 && y >= mainY-mainH/2 && y <= mainY+mainH/2;
  if(within){ mainFocused = true; draw(); } else { mainFocused = false; draw(); }
});

inputMainWeight.addEventListener('focus', ()=>{ mainFocused = true; draw(); });
inputMainWeight.addEventListener('blur', ()=>{ mainFocused = false; draw(); });

document.addEventListener('click', e=>{
  const t = e.target;
  if(t === inputMainWeight) return;
  if(t === canvas) return; // canvas handler toggles focus already
  if(mainFocused){ mainFocused = false; draw(); }
});

// On load: avoid loading bare defaultSrc when under file:// to prevent phantom errors
window.addEventListener('load', ()=>{
  try{
    const isFile = location && location.protocol === 'file:';
    const isBare = typeof state.defaultSrc === 'string' && !/^data:|^blob:|^https?:\/\//i.test(state.defaultSrc);
    if(isFile && isBare){ setUploadStatus('Using vector template (no default image)'); switchToVector(); return; }
    // Try HEAD if bare but served over HTTP
    if(isBare){ fetch(state.defaultSrc,{method:'HEAD'}).then(r=>{ if(r.ok) loadScreenshot(state.defaultSrc); else { switchToVector(); } }).catch(()=>switchToVector()); return; }
    loadScreenshot(state.defaultSrc);
  }catch(e){ switchToVector(); }
});

</script>

</body>
</html>
